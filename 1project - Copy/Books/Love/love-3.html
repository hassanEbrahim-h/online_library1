    <div class="book-details-container">
      <div class="book-card-large">
        <div class="book-image-section" style="padding: 0;">
          <img src="../../images/img14.png" alt="أنت مني" style="width: 100%; height: 100%; object-fit: cover; border-radius: 0 20px 20px 0;" />
        </div>
        <div class="book-info-section">
          <h1 class="book-title">أنت مني</h1>

            قصة حب تتحدى الصعاب والمستحيل.
          </p>
          <div class="action-buttons">
            <button class="btn btn-primary" onclick="addToCart('love-3', 'أنت مني', 225, '1project - Copy/images/img14.png')"><i class="fas fa-cart-plus"></i> إضافة للسلة</button>

          </div>
        </div>
      </div>
    </div>
    
  <script>
    function addToCart(id, title, price, imageSrc) {
        let cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];
        const existingItem = cartItems.find(item => item.id === id);
        if (existingItem) {
            existingItem.quantity += 1;
        } else {
            cartItems.push({
                id: id,
                title: title,
                price: price,
                quantity: 1,
                image: imageSrc
            });
        }
        localStorage.setItem("cartItems", JSON.stringify(cartItems));
        window.location.href = '../../../cart.html';
    }
  </script>
