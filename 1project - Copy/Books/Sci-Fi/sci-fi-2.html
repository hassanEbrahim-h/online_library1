    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </head>
  <body>
    <div class="navbar">
      <div class="container">
        <div class="logo">
          <img src="../../images/2232688.png" />
          <a href="../../Home.html">Novelix</a>
        </div>
        <nav>
          <ul>
             <li><a href="../../../index.html">HOME</a></li>
            <li><a href="../../../prodect.html">PRODECT</a></li>
            <li><a href="../../../conent.html">CONENT</a></li>
            <li><a href="../../../about.html">ABOUT</a></li>
            <li><a href="../../../cart.html"><i class="fas fa-shopping-cart"></i> CART</a></li>
            <li class="nav-login-box">
              <a class="nav-login-btn" href="../../../Login.html">LOGIN</a>
            </li>
          </ul>
        </nav>
      </div>
    </div>

    <div class="book-details-container">
      <div class="book-card-large">
        <div class="book-image-section" style="padding: 0;">
          <img src="../../images/sa.jfif" alt="Night" style="width: 100%; height: 100%; object-fit: cover; border-radius: 20px 0 0 20px;" />
        </div>
        <div class="book-info-section">
          <h1 class="book-title">Night</h1>
          <h3 class="book-author"><i class="fas fa-user-edit"></i> Unknown Author</h3>
          <p class="book-description">
            A thrilling sci-fi adventure that takes place in the dark.
          </p>
          <div class="action-buttons">
            <button class="btn btn-primary" onclick="addToCart('sci-fi-2', 'Night', 150, '1project - Copy/images/sa.jfif')"><i class="fas fa-cart-plus"></i> Add to Cart</button>
            <a href="../../../prodect.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back to Books</a>
          </div>
        </div>
      </div>
    </div>
    
  <script>
    function addToCart(id, title, price, imageSrc) {
        let cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];
        const existingItem = cartItems.find(item => item.id === id);
        if (existingItem) {
            existingItem.quantity += 1;
        } else {
            cartItems.push({
                id: id,
                title: title,
                price: price,
                quantity: 1,
                image: imageSrc
            });
        }
        localStorage.setItem("cartItems", JSON.stringify(cartItems));
        window.location.href = '../../../cart.html';
    }
  </script>
  </body>
</html>
